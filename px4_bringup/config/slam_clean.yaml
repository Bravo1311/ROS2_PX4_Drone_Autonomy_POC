slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # Frames (must exist: odom->base_link and base_link->lidar_link)
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # Input scan (your perception.launch produces /scan_fixed)
    scan_topic: /scan_fixed

    # Mapping behavior
    mode: mapping
    resolution: 0.05
    max_laser_range: 30.0
    minimum_time_interval: 0.0

    publish_tf: true

    # Publish map->odom TF steadily
    transform_publish_period: 0.02
    tf_buffer_duration: 30.0

    # Stability
    throttle_scans: 1
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05
    map_update_interval: 0.5

    # Loop closing (good indoor default)
    do_loop_closing: true
    loop_search_maximum_distance: 6.0