amcl:
  ros__parameters:
    use_sim_time: true

# ---------------------------
# BT NAVIGATOR
# ---------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link

# ---------------------------
# PLANNER
# ---------------------------
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

# ---------------------------
# CONTROLLER
# ---------------------------
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.8
      lookahead_dist: 1.5
      min_lookahead_dist: 0.5
      max_lookahead_dist: 3.0
      transform_tolerance: 0.5


# ---------------------------
# DOCKING SERVER (OK TO LEAVE DEFAULT)
# ---------------------------

docking_server:
  ros__parameters:
    use_sim_time: true

    # REQUIRED by docking_server:
    dock_plugins: ['dummy_dock_type']

    dummy_dock_type:
      plugin: 'opennav_docking::SimpleChargingDock'
      # make it "blind" / non-dependent
      use_external_detection_pose: false
      use_battery_status: false
      use_stall_detection: false

    # REQUIRED by docking_server:
    docks: ['dummy_dock']
    dummy_dock:
      type: 'dummy_dock_type'
      frame: map
      pose: [0.0, 0.0, 0.0]

# ---------------------------
# SMOOTHER
# ---------------------------
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"

# ---------------------------
# BEHAVIORS
# ---------------------------
behavior_server:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link

# ---------------------------
# WAYPOINT FOLLOWER
# ---------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: true

# ---------------------------
# VELOCITY SMOOTHER (NAV2 TOPIC IS cmd_vel_nav)
# ---------------------------
velocity_smoother:
  ros__parameters:
    use_sim_time: true

# ---------------------------
# ROUTE SERVER (OK TO LEAVE DEFAULT)
# ---------------------------
route_server:
  ros__parameters:
    use_sim_time: true


# ---------------------------
# COLLISION MONITOR (REQUIRED PARAMS TO AVOID ABORT)
# ---------------------------
collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_link
    odom_frame_id: odom
    transform_tolerance: 0.5

    # Nav2 Jazzy bringup remaps cmd_vel -> cmd_vel_nav
    cmd_vel_in_topic: cmd_vel_nav
    cmd_vel_out_topic: cmd_vel_nav
    polygons: ["StopZone"]

    StopZone:
      type: "polygon"
      action_type: "stop"
      min_points: 4
      points: "[[0.6, 0.6], [0.6, -0.6], [-0.6, -0.6], [-0.6, 0.6]]"
      enabled: true

    # Required field:
    observation_sources: ["scan"]

    scan:
      type: "scan"
      topic: "/scan_fixed"
      enabled: true
      obstacle_min_range: 0.2
      obstacle_max_range: 28.0
      min_obstacle_height: -100.0
      max_obstacle_height: 100.0
      source_timeout: 1.0

# ---------------------------
# GLOBAL COSTMAP (MAP FRAME)
# ---------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link

      resolution: 0.05
      track_unknown_space: true
      rolling_window: false

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan

        scan:
          topic: /scan_fixed
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_min_range: 0.2
          obstacle_max_range: 28.0
          raytrace_min_range: 0.2
          raytrace_max_range: 29.0
          inf_is_valid: true
          sensor_frame: lidar_link

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.8
        cost_scaling_factor: 5.0

# ---------------------------
# LOCAL COSTMAP (ODOM FRAME)
# ---------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link

      rolling_window: true
      width: 50
      height: 50
      resolution: 0.05

      update_frequency: 10.0
      publish_frequency: 5.0
      transform_tolerance: 0.5

      robot_radius: 0.5

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        max_obstacle_height: 100.0
        min_obstacle_height: -100.0

        scan:
          topic: /scan_fixed
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_min_range: 0.2
          obstacle_max_range: 28.0
          raytrace_min_range: 0.2
          raytrace_max_range: 29.0
          inf_is_valid: true
          sensor_frame: lidar_link
          max_obstacle_height: 100.0
          min_obstacle_height: -100.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.8
        cost_scaling_factor: 5.0

# ---------------------------
# LIFECYCLE MANAGER
# ---------------------------
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      # - route_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
      - collision_monitor
      - docking_server
      - global_costmap
      - local_costmap