slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # Frames
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # Inputs
    scan_topic: /scan_fixed

    # Behavior
    mode: mapping                # mapping | localization
    publish_tf: true
    transform_publish_period: 0.05

    # Performance / stability
    minimum_time_interval: 0.05
    throttle_scans: 1
    map_update_interval: 2.0
    resolution: 0.05

    # Useful in sim
    use_scan_matching: true